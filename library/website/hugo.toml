baseURL = "https://johndoe.github.io/application/"
title = "My Application"
copyright = "[© Apache License 2.0](https://www.apache.org/licenses/LICENSE-2.0.txt)"

[module]
[[module.imports]]
path = "github.com/alex-shpak/hugo-book"

# Book configuration
disablePathToLower = true
enableGitInfo = true

[outputFormats]
[outputFormats.txt]
mediaType = "text/plain"
baseName = "source"
isPlainText = true

[outputs]
home = ["html", "txt", "rss"]
page = ["html", "txt"]
section = ["html", "txt"]

# Needed for mermaid/katex shortcodes
[markup]
[markup.goldmark.renderer]
unsafe = true

[markup.tableOfContents]
startLevel = 1

[markup.highlight]
style = "base16-snazzy"

[languages]
[languages.en]
label = "English"
contentDir = "content"
weight = 1

[[menu.home]]
name = "GoDoc"
url = "api/godoc/"
weight = 2

[[menu.home]]
name = "Github"
url = "https://github.com/johndoe/application/"
weight = 3

# [[menu.before]]
[[menu.after]]
name = "Github"
url = "https://github.com/johndoe/application/"
weight = 10

[params]
BookTheme = "auto"
# BookToC = true
# BookFavicon = "favicon.png"
# BookLogo = "logo.png"
BookRepo = "https://github.com/johndoe/application/"
BookSearch = true
BookComments = false
BookPortableLinks = "warning"
BookServiceWorker = "precache"
BookTranslatedOnly = false
